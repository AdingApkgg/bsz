# Nginx 1.29+ 配置示例 — 单域名一体化部署 (HTTP/3 + HTTP/2 + HSTS + SSL)
#
# 一台 VPS 上用同一个域名同时提供三样东西：
#   /        → landing 静态站点 (frontend/packages/landing/dist)
#   /api     → Rust 后端 (公开统计 API + /api/admin/*)
#   /dash    → admin 管理后台 SPA (frontend/packages/admin/dist)
#
# landing 与后端同源，浏览器的 POST /api 请求自带 cookie，无需额外 CORS。
# 如果你更想把前端丢到 GitHub/Cloudflare Pages、nginx 只反代 API，
# 请改用同目录的 `nginx.conf`。
#
# ── 构建 & 部署静态产物 ────────────────────────────────────────────
#   cd frontend && bun install
#
#   # landing → 网站根目录
#   bun run build:landing
#   sudo rsync -a --delete --exclude /dash \
#       packages/landing/dist/ /var/www/bsz/
#
#   # admin → /dash 子路径（用 /dash/ 作为 base；admin 的 <Router> 已读取
#   # import.meta.env.BASE_URL，所以 --base 一传路由就自动跟着走）
#   cd packages/admin
#   VITE_API_BASE_URL=https://bsz.example.com bunx vite build --base=/dash/
#   bun scripts/postbuild.ts
#   sudo rsync -a --delete dist/ /var/www/bsz/dash/
#
#   sudo chown -R www-data:www-data /var/www/bsz
# ───────────────────────────────────────────────────────────────────
#
# 请按需修改 server_name 和证书路径。

upstream busuanzi {
    server 127.0.0.1:12700;
    keepalive 32;
}

# HTTP -> HTTPS 重定向
server {
    listen 80;
    listen [::]:80;
    server_name bsz.example.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS + HTTP/2 + HTTP/3
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic reuseport;
    listen [::]:443 quic reuseport;
    http2 on;

    server_name bsz.example.com;

    # SSL 证书
    ssl_certificate /etc/letsencrypt/live/bsz.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bsz.example.com/privkey.pem;

    # SSL 配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache shared:BSZ_SSL:10m;
    ssl_session_tickets off;

    # HSTS (2 年)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # HTTP/3 Alt-Svc 头
    add_header Alt-Svc 'h3=":443"; ma=86400' always;

    # 安全头
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # QUIC 传输参数
    quic_retry on;
    ssl_early_data on;

    # 日志
    access_log /var/log/nginx/bsz.access.log;
    error_log /var/log/nginx/bsz.error.log;

    # 上传体积上限 (导入数据库等)
    client_max_body_size 1g;

    # 静态站点根目录 (landing 产物直接铺在这里, admin 在 dash/ 子目录)
    root /var/www/bsz;
    index index.html;

    # 给 .txt / .xml 等文本响应补上 charset, 否则 llms.txt / sitemap.xml
    # 直接访问时浏览器可能按本地编码解析导致中文乱码。
    charset utf-8;

    # SSE 长连接 (sitemap 同步) — 比 /api 前缀更长, 必须放在前面优先匹配
    location /api/admin/sync {
        proxy_pass http://busuanzi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # SSE 需要禁用缓冲
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # 后端 API (公开统计 + /api/admin/*)
    location /api {
        proxy_pass http://busuanzi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # 健康检查
    location = /ping {
        proxy_pass http://busuanzi;
        proxy_http_version 1.1;
        access_log off;
    }

    # admin 管理后台 SPA (产物用 base=/dash/ 构建)
    location /dash {
        try_files $uri $uri/ /dash/index.html;
    }

    # landing 静态资源 + SPA 回退
    location / {
        try_files $uri $uri/ /index.html;
    }
}
